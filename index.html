<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Market Summary Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f1115;
            color: #e2e8f0;
            margin: 0;
            padding: 24px;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 📱 상단 내비게이션 메뉴바 스타일 */
        .navbar {
            display: flex;
            gap: 8px;
            background-color: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 24px;
        }
        .nav-btn {
            background: none; border: none; color: #8b949e;
            padding: 10px 20px; font-size: 15px; font-weight: 600;
            cursor: pointer; border-radius: 6px; transition: all 0.2s ease;
        }
        .nav-btn:hover { color: #ffffff; background-color: #21262d; }
        .nav-btn.active { color: #ffffff; background-color: #38bdf8; }

        /* 페이지 세션 제어용 */
        .page { display: none; }
        .page.active { display: block; }

        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 32px;
        }
        header h1 { color: #ffffff; margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .date { color: #94a3b8; font-size: 14px; }

        .card {
            background-color: #161b22; border: 1px solid #21262d; border-radius: 12px;
            padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card h2 { margin-top: 0; margin-bottom: 16px; font-size: 20px; font-weight: 700; }
        .card.stock { border-top: 4px solid #38bdf8; } .card.stock h2 { color: #38bdf8; }
        .card.rate { border-top: 4px solid #34d399; } .card.rate h2 { color: #34d399; }
        .card.intel { border-top: 4px solid #a855f7; } .card.intel h2 { color: #a855f7; }
        .card.reports { border-top: 4px solid #fbbf24; } .card.reports h2 { color: #fbbf24; }

        .market-text {
            background-color: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            padding: 16px; font-size: 14.5px; white-space: pre-wrap; color: #c9d1d9;
        }
        .no-opinion {
            text-align: center; color: #8b949e; font-style: italic; padding: 40px 0; font-size: 16px;
        }
        .loading { color: #8b949e; font-style: italic; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-link {
            background-color: #21262d; color: #c9d1d9; text-decoration: none; padding: 10px 20px;
            border-radius: 6px; font-size: 14px; border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 📱 상단 메뉴바 -->
        <nav class="navbar">
            <button class="nav-btn active" onclick="switchPage('daily-page', this)">📊 데일리 시황</button>
            <button class="nav-btn" onclick="switchPage('intel-page', this)">💡 Market Intel</button>
        </nav>

        <!-- 1️⃣ 첫 번째 페이지: 데일리 시황 -->
        <div id="daily-page" class="page active">
            <header>
                <h1>📈 데일리 시황 대시보드</h1>
                <div class="date" id="live-update-date">최종 업데이트: 로딩 중...</div>
            </header>
            <div class="card stock">
                <h2 id="stock-title">📊 주식</h2>
                <div class="market-text" id="stock-market-content"><span class="loading">로딩 중...</span></div>
            </div>
            <div class="card rate">
                <h2 id="rate-title">💸 금리</h2>
                <div class="market-text" id="rate-market-content"><span class="loading">로딩 중...</span></div>
            </div>
            <div class="card reports">
                <h2>🌐 외신 링크</h2>
                <div class="btn-group">
                    <a href="https://www.bloomberg.com" target="_blank" class="btn-link">Bloomberg 바로가기</a>
                    <a href="https://www.reuters.com" target="_blank" class="btn-link">Reuters 바로가기</a>
                </div>
            </div>
        </div>

        <!-- 2️⃣ 두 번째 페이지: Market Intel -->
        <div id="intel-page" class="page">
            <header>
                <h1>💡 Market Intel 심층 분석</h1>
                <div class="date" id="intel-update-date">최종 업데이트: 로딩 중...</div>
            </header>
            <div class="card intel">
                <h2 id="intel-title">📋 딥러닝 PDF 분석 보고서</h2>
                <div class="market-text" id="intel-market-content">
                    <span class="loading">최신 인텔리전스 보고서를 조회 중입니다...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        const sheetId = '1SBD-To57_OOvAnB3a4vmN9fURD0wZgIR_hXaoIZPLpc';

        // 🛠️ 오류를 해결하기 위해 더 정밀하게 다듬은 날짜 파싱 함수
        function parseSheetDate(dateVal) {
            if (!dateVal) return null;
            
            let d;
            if (typeof dateVal === 'string') {
                if (dateVal.startsWith('Date')) {
                    d = new Date(eval(dateVal));
                } else {
                    // "2026-07-08", "2026. 7. 8." 등 다양한 텍스트 형태 강제 변환
                    d = new Date(dateVal.replace(/\./g, '-').replace(/\s/g, ''));
                }
            } else {
                d = new Date(dateVal);
            }
            
            if (isNaN(d.getTime())) return null;
            return d;
        }

        // 출력용 포맷팅 (YYYY-MM-DD)
        function getFormattedString(dateObj) {
            if (!dateObj) return { display: '날짜 없음', title: 'XXXX-XX-XX', key: '' };
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return {
                display: `${year}. ${month}. ${day}.`,
                title: `${year}-${month}-${day}`,
                key: `${year}-${month}-${day}`
            };
        }

        async function fetchAllData() {
            const urlDaily = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=0&tqx=out:json`;
            const urlIntel = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=Market+Intel&tqx=out:json`;

            try {
                // 1. 데일리 시황 연동
                const resDaily = await fetch(urlDaily);
                const textDaily = await resDaily.text();
                const jsonDaily = JSON.parse(textDaily.substring(textDaily.indexOf('{'), textDaily.lastIndexOf('}') + 1));
                const rowsDaily = jsonDaily.table.rows;

                if (rowsDaily && rowsDaily.length > 0) {
                    const lastRow = rowsDaily[rowsDaily.length - 1];
                    let dailyDateObj = parseSheetDate(lastRow.c[0] ? lastRow.c[0].v : null);
                    let dailyInfo = getFormattedString(dailyDateObj);
                    
                    document.getElementById('stock-market-content').innerText = lastRow.c[1] ? lastRow.c[1].v : '내용 없음';
                    document.getElementById('rate-market-content').innerText = lastRow.c[2] ? lastRow.c[2].v : '내용 없음';
                    document.getElementById('live-update-date').innerText = `최종 업데이트: ${dailyInfo.display}`;
                    document.getElementById('stock-title').innerText = `📊 주식 (${dailyInfo.title})`;
                    document.getElementById('rate-title').innerText = `💸 금리 (${dailyInfo.title})`;
                }

                // 2. Market Intel 연동 (날짜 정밀 매칭 오류 수정 버전)
                const resIntel = await fetch(urlIntel);
                const textIntel = await resIntel.text();
                const jsonIntel = JSON.parse(textIntel.substring(textIntel.indexOf('{'), textIntel.lastIndexOf('}') + 1));
                const rowsIntel = jsonIntel.table.rows;

                const intelContentEl = document.getElementById('intel-market-content');
                
                if (!rowsIntel || rowsIntel.length === 0) {
                    intelContentEl.innerHTML = `<div class="no-opinion">금일 의견 없음</div>`;
                    document.getElementById('intel-update-date').innerText = "최종 업데이트: 없음";
                    return;
                }

                const lastIntelRow = rowsIntel[rowsIntel.length - 1];
                let intelDateObj = parseSheetDate(lastIntelRow.c[0] ? lastIntelRow.c[0].v : null);
                let intelInfo = getFormattedString(intelDateObj);
                let intelReport = lastIntelRow.c[1] ? lastIntelRow.c[1].v : null;

                // 컴퓨터 실제 '오늘 날짜' 구하기
                const todayInfo = getFormattedString(new Date());

                // 💡 [핵심 보완] 유연해진 날짜 스트링 키값 비교 (형식 차이 완전 극복)
                if (intelInfo.key !== todayInfo.key || !intelReport) {
                    intelContentEl.innerHTML = `<div class="no-opinion">금일 의견 없음</div>`;
                    document.getElementById('intel-update-date').innerText = `최종 업데이트: ${intelInfo.display}`;
                    document.getElementById('intel-title').innerText = `📋 딥러닝 PDF 분석 보고서 (${intelInfo.title})`;
                } else {
                    intelContentEl.innerText = intelReport;
                    document.getElementById('intel-update-date').innerText = `최종 업데이트: ${intelInfo.display}`;
                    document.getElementById('intel-title').innerText = `📋 딥러닝 PDF 분석 보고서 (${intelInfo.title})`;
                }

            } catch (error) {
                console.error("데이터 로딩 중 에러 발생:", error);
            }
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
