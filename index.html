<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Market Summary Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f1115;
            color: #e2e8f0;
            margin: 0;
            padding: 24px;
            line-height: 1.7;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 📱 상단 메뉴바 - 스크롤 시 상단에 고정되도록 고도화 (Sticky) */
        .navbar {
            display: flex; gap: 8px; background-color: #161b22;
            border: 1px solid #21262d; border-radius: 8px; padding: 6px; 
            margin-bottom: 24px;
            position: sticky; top: 12px; z-index: 1000;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        .nav-btn {
            background: none; border: none; color: #8b949e; padding: 10px 20px;
            font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s ease;
        }
        .nav-btn:hover { color: #ffffff; background-color: #21262d; }
        .nav-btn.active { color: #ffffff; background-color: #38bdf8; }

        .page { display: none; }
        .page.active { display: block; }

        header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 32px;
            margin-top: 12px; /* 상단 메뉴바 고정 시 여백 확보 */
        }
        header h1 { color: #ffffff; margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .date { color: #94a3b8; font-size: 14px; }

        .card {
            background-color: #161b22; border: 1px solid #21262d; border-radius: 12px;
            padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card h2 { margin-top: 0; margin-bottom: 20px; font-size: 22px; font-weight: 700; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .card.stock { border-top: 4px solid #38bdf8; } .card.stock h2 { color: #38bdf8; }
        .card.rate { border-top: 4px solid #34d399; } .card.rate h2 { color: #34d399; }
        .card.intel { border-top: 4px solid #a855f7; } .card.intel h2 { color: #a855f7; }

        /* 📑 전문 경제 뉴스 리포트 스타일링 구역 */
        .market-text {
            background-color: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            padding: 24px; font-size: 15px; color: #c9d1d9;
        }
        
        /* 실시간 파싱용 서식 스타일 클래스 */
        .intel-section-title {
            font-size: 18px; font-weight: 700; color: #f8fafc;
            margin-top: 24px; margin-bottom: 12px; padding-left: 8px;
            border-left: 4px solid #a855f7; display: block;
        }
        .intel-section-title:first-child { margin-top: 0; }
        
        .intel-paragraph {
            margin: 0 0 12px 0; padding-left: 4px; text-align: justify; word-break: break-all;
        }
        .intel-highlight {
            color: #ffda6a; font-weight: 700; background-color: rgba(255, 218, 106, 0.08);
            padding: 1px 4px; border-radius: 4px;
        }

        .no-opinion { text-align: center; color: #8b949e; font-style: italic; padding: 40px 0; font-size: 16px; }
        .loading { color: #8b949e; font-style: italic; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- 📱 상단 메뉴바 (고정형 적용 완료) -->
        <nav class="navbar">
            <button class="nav-btn active" onclick="switchPage('daily-page', this)">📊 데일리 시황</button>
            <button class="nav-btn" onclick="switchPage('intel-page', this)">💡 Market Intel</button>
        </nav>

        <!-- 1️⃣ 첫 번째 페이지: 데일리 시황 (외신 링크 블록 삭제 완료) -->
        <div id="daily-page" class="page active">
            <header>
                <h1>📈 데일리 시황 대시보드</h1>
                <div class="date" id="live-update-date">최종 업데이트: 로딩 중...</div>
            </header>
            <div class="card stock">
                <h2 id="stock-title">📊 주식</h2>
                <div class="market-text" id="stock-market-content"><span class="loading">로딩 중...</span></div>
            </div>
            <div class="card rate">
                <h2 id="rate-title">💸 금리</h2>
                <div class="market-text" id="rate-market-content"><span class="loading">로딩 중...</span></div>
            </div>
        </div>

        <!-- 2️⃣ 두 번째 페이지: Market Intel -->
        <div id="intel-page" class="page">
            <header>
                <h1>💡 Market Intel 심층 분석</h1>
                <div class="date" id="intel-update-date">최종 업데이트: 로딩 중...</div>
            </header>
            <div class="card intel">
                <h2>Market Intel</h2>
                <div class="market-text" id="intel-market-content">
                    <span class="loading">최신 인텔리전스 보고서를 조회 중입니다...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
            
            // 탭 전환 시 스크롤을 맨 위로 부드럽게 이동시키는 안전장치
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        const sheetId = '1SBD-To57_OOvAnB3a4vmN9fURD0wZgIR_hXaoIZPLpc';

        function parseAndFormatDate(dateVal) {
            if (!dateVal) return null;
            let actualDate;
            if (typeof dateVal === 'string' && dateVal.startsWith('Date')) {
                try {
                    const dateParts = dateVal.match(/\d+/g).map(Number);
                    if (dateParts.length >= 3) {
                        actualDate = new Date(dateParts[0], dateParts[1], dateParts[2]);
                    }
                } catch(e) { console.error(e); }
            } else {
                actualDate = new Date(dateVal);
            }
            if (!actualDate || isNaN(actualDate.getTime())) return null;
            const year = actualDate.getFullYear();
            const month = String(actualDate.getMonth() + 1).padStart(2, '0');
            const day = String(actualDate.getDate()).padStart(2, '0');
            return { display: `${year}. ${month}. ${day}.`, title: `${year}-${month}-${day}` };
        }

        function renderIntelReportToHTML(rawText) {
            if (!rawText) return `<div class="no-opinion">금일 의견 없음</div>`;
            
            const lines = rawText.split('\n');
            let htmlOutput = "";

            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('###') || trimmed.startsWith('1.') || trimmed.startsWith('2.') || trimmed.startsWith('3.') || trimmed.startsWith('4.') || 
                    trimmed.includes('주요 매크로 이벤트') || trimmed.includes('미국 주식시장 브리핑') || trimmed.includes('TMT') || trimmed.includes('MONETIZATION')) {
                    
                    let cleanTitle = trimmed.replace(/###/g, '').trim();
                    htmlOutput += `<span class="intel-section-title">${cleanTitle}</span>`;
                } 
                else {
                    let formattedLine = trimmed.replace(/\*\*(.*?)\*\*/g, '<span class="intel-highlight">$1</span>');
                    formattedLine = formattedLine.replace(/(-?\d+(\.\d+)?\s?%|-?\d+\s?bp|\$\d+(\.\d+)?)/g, '<span class="intel-highlight">$1</span>');
                    htmlOutput += `<p class="intel-paragraph">${formattedLine}</p>`;
                }
            });

            return htmlOutput;
        }

        async function fetchAllData() {
            const urlDaily = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=0&tqx=out:json`;
            const urlIntel = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=1681828616&tqx=out:json`;

            try {
                // 1. 데일리 시황 파트 연동
                const resDaily = await fetch(urlDaily);
                const textDaily = await resDaily.text();
                const jsonDaily = JSON.parse(textDaily.substring(textDaily.indexOf('{'), textDaily.lastIndexOf('}') + 1));
                const rowsDaily = jsonDaily.table.rows;

                if (rowsDaily && rowsDaily.length > 0) {
                    const lastRow = rowsDaily[rowsDaily.length - 1];
                    let dailyDateInfo = parseAndFormatDate(lastRow.c[0] ? lastRow.c[0].v : null);
                    let displayDate = dailyDateInfo ? dailyDateInfo.display : '날짜 없음';
                    let titleDate = dailyDateInfo ? dailyDateInfo.title : 'XXXX-XX-XX';
                    
                    document.getElementById('stock-market-content').innerText = lastRow.c[1] ? lastRow.c[1].v : '내용 없음';
                    document.getElementById('rate-market-content').innerText = lastRow.c[2] ? lastRow.c[2].v : '내용 없음';
                    document.getElementById('live-update-date').innerText = `최종 업데이트: ${displayDate}`;
                    document.getElementById('stock-title').innerText = `📊 주식 (${titleDate})`;
                    document.getElementById('rate-title').innerText = `💸 금리 (${titleDate})`;
                }

                // 2. Market Intel 파트 연동
                const resIntel = await fetch(urlIntel);
                const textIntel = await resIntel.text();
                const jsonIntel = JSON.parse(textIntel.substring(textIntel.indexOf('{'), textIntel.lastIndexOf('}') + 1));
                const rowsIntel = jsonIntel.table.rows;

                const intelContentEl = document.getElementById('intel-market-content');
                
                if (!rowsIntel || rowsIntel.length === 0) {
                    intelContentEl.innerHTML = `<div class="no-opinion">금일 의견 없음</div>`;
                    document.getElementById('intel-update-date').innerText = "최종 업데이트: 없음";
                    return;
                }

                let combinedReport = "";
                let firstValidDateInfo = null;

                rowsIntel.forEach(row => {
                    if (row.c[0] && row.c[0].v && !firstValidDateInfo) {
                        firstValidDateInfo = parseAndFormatDate(row.c[0].v);
                    }
                    if (row.c[1] && row.c[1].v) {
                        combinedReport += row.c[1].v + "\n";
                    }
                });

                intelContentEl.innerHTML = renderIntelReportToHTML(combinedReport);
                
                let intelDisplayDate = firstValidDateInfo ? firstValidDateInfo.display : '날짜 없음';
                document.getElementById('intel-update-date').innerText = `최종 업데이트: ${intelDisplayDate}`;

            } catch (error) {
                console.error("데이터 통합 로딩 에러:", error);
            }
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
